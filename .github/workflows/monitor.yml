name: playtomic-monitor

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      # `secrets` can't be referenced in a step `if:`; expose its presence as an
      # env flag ("true"/"false") — the env context IS allowed in `if:`.
      MEMBER_VIEW: ${{ secrets.PLAYTOMIC_REFRESH_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v5

      # --- Member session: refresh the access token in a real headless browser.
      # The refresh runs client-side JS on app.playtomic.com/refresh, which plain
      # HTTP clients / the relay can't execute. Playtomic rotates the refresh token
      # on use, so we capture the new one and persist it back into the secret.
      - uses: actions/setup-node@v4
        if: env.MEMBER_VIEW == 'true'
        with:
          node-version: 20

      - name: Cache Playwright browser
        if: env.MEMBER_VIEW == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('auth/package.json') }}

      - name: Install auth deps
        if: env.MEMBER_VIEW == 'true'
        working-directory: auth
        run: |
          npm install --no-audit --no-fund
          npx playwright install --with-deps chromium

      # Playtomic's WAF 403s the datacenter runner IP, so the browser can't reach
      # the refresh flow directly. Cloudflare WARP (proxy mode) gives the browser a
      # WAF-accepted egress (same as the Worker relay). Only the browser uses this
      # proxy; the rest of the job (relay GET, gh, git) stays on the normal network.
      - name: Route browser via Cloudflare WARP
        if: env.MEMBER_VIEW == 'true'
        run: |
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor -o /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          sudo apt-get update -qq
          sudo apt-get install -y cloudflare-warp
          sudo systemctl start warp-svc || true
          sleep 5
          warp-cli --accept-tos registration new || warp-cli --accept-tos register || true
          warp-cli --accept-tos mode proxy || warp-cli --accept-tos set-mode proxy || true
          warp-cli --accept-tos connect || true
          sleep 8
          curl -sf -x socks5h://127.0.0.1:40000 https://www.cloudflare.com/cdn-cgi/trace | grep -q 'warp=on' \
            && echo "WARP proxy up" \
            || echo "::warning::WARP proxy not confirmed — refresh will likely 403 and fall back to anonymous"

      - name: Refresh member session
        id: refresh
        if: env.MEMBER_VIEW == 'true'
        continue-on-error: true
        working-directory: auth
        run: node refresh.js
        env:
          PLAYTOMIC_REFRESH_TOKEN: ${{ secrets.PLAYTOMIC_REFRESH_TOKEN }}
          PLAYTOMIC_PROXY: socks5://127.0.0.1:40000

      # Persist the rotated refresh token into the secret (never into git: the repo
      # is public). Needs GH_PAT: a fine-grained PAT with Secrets:write on this repo.
      - name: Persist rotated refresh token
        if: steps.refresh.outcome == 'success'
        continue-on-error: true  # persistence trouble must never block the monitor
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ ! -f "$RUNNER_TEMP/pt_refresh" ]; then
            echo "no new refresh token captured this run"; exit 0
          fi
          if [ -z "$GH_TOKEN" ]; then
            echo "::warning::GH_PAT not set — cannot persist the rotated refresh token; the member session will break next run. Add GH_PAT (fine-grained PAT, Secrets:write) or re-paste PLAYTOMIC_REFRESH_TOKEN."
            exit 0
          fi
          gh secret set PLAYTOMIC_REFRESH_TOKEN --body "$(cat "$RUNNER_TEMP/pt_refresh")" && echo "rotated refresh token persisted"

      - name: Check availability
        run: |
          # Prefer the freshly refreshed member cookie; fall back to the manual
          # PLAYTOMIC_COOKIE secret (if set), else anonymous view.
          if [ -f "$RUNNER_TEMP/pt_cookie" ]; then
            export PLAYTOMIC_COOKIE="$(cat "$RUNNER_TEMP/pt_cookie")"
          fi
          python3 monitor.py
        env:
          # playtomic.com 403s GitHub datacenter IPs; route public GETs via the relay Worker.
          PLAYTOMIC_BASE: https://playtomic-relay.andrea-marrano921093.workers.dev
          PLAYTOMIC_RELAY_TOKEN: ${{ secrets.PLAYTOMIC_RELAY_TOKEN }}
          PLAYTOMIC_COOKIE: ${{ secrets.PLAYTOMIC_COOKIE }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CALLMEBOT_PHONE: ${{ secrets.CALLMEBOT_PHONE }}
          CALLMEBOT_APIKEY: ${{ secrets.CALLMEBOT_APIKEY }}

      - name: Persist state
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          # Re-sync with remote before committing: the checked-out SHA may be
          # stale (re-runs, pushes landed while this run was executing).
          cp state.json /tmp/state.json
          git fetch origin main
          git reset --hard origin/main
          cp /tmp/state.json state.json
          git add state.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: update slot state"
            git push origin HEAD:main
          fi
