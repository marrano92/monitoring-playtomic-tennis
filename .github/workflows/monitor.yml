name: playtomic-monitor

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check availability
        run: python3 monitor.py
        env:
          # playtomic.com 403s GitHub datacenter IPs; route public GETs via the relay Worker.
          PLAYTOMIC_BASE: https://playtomic-relay.andrea-marrano921093.workers.dev
          PLAYTOMIC_RELAY_TOKEN: ${{ secrets.PLAYTOMIC_RELAY_TOKEN }}
          PLAYTOMIC_EMAIL: ${{ secrets.PLAYTOMIC_EMAIL }}
          PLAYTOMIC_PASSWORD: ${{ secrets.PLAYTOMIC_PASSWORD }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CALLMEBOT_PHONE: ${{ secrets.CALLMEBOT_PHONE }}
          CALLMEBOT_APIKEY: ${{ secrets.CALLMEBOT_APIKEY }}

      - name: Persist state
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          # Re-sync with remote before committing: the checked-out SHA may be
          # stale (re-runs, pushes landed while this run was executing).
          cp state.json /tmp/state.json
          git fetch origin main
          git reset --hard origin/main
          cp /tmp/state.json state.json
          git add state.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: update slot state"
            git push origin HEAD:main
          fi
