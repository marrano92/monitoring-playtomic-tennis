name: playtomic-bookings

on:
  schedule:
    - cron: "30 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: monitor
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Sync bookings to Google Calendar
        run: python3 monitor.py --sync-bookings
        env:
          PLAYTOMIC_EMAIL: ${{ secrets.PLAYTOMIC_EMAIL }}
          PLAYTOMIC_PASSWORD: ${{ secrets.PLAYTOMIC_PASSWORD }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}

      - name: Persist state
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          # Re-sync with remote before committing: the checked-out SHA may be
          # stale (re-runs, pushes landed while this run was executing).
          cp calendar_state.json /tmp/calendar_state.json
          git fetch origin main
          git reset --hard origin/main
          cp /tmp/calendar_state.json calendar_state.json
          git add calendar_state.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: update calendar state"
            git push origin HEAD:main
          fi
